name: Release Binaries

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g. v1.0.0, v1.2.0)
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

permissions:
  contents: write # Required to create a release and upload assets

jobs:
  release:
    name: Build & Release Cross-Platform Binaries
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          # Exclude combinations that aren't widely needed or supported (optional)
          - goos: windows
            goarch: arm64 # Windows ARM64 is rare, but can keep if needed.
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.10'
          cache: true

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          BINARY_NAME="milvus_cli"
          # Append .exe extension for Windows build
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          
          # Build with compiler optimization flags (strip debug symbols and DWARF tables to minimize size)
          go build -ldflags="-s -w" -o "${BINARY_NAME}" .
          
          # Pack binary into archive
          ARCHIVE_NAME="milvus_cli-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${ARCHIVE_NAME}.zip" "${BINARY_NAME}"
            echo "ASSET_PATH=${ARCHIVE_NAME}.zip" >> $GITHUB_ENV
          else
            tar -czvf "${ARCHIVE_NAME}.tar.gz" "${BINARY_NAME}"
            echo "ASSET_PATH=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ env.ASSET_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
